name: rsshub-twitter

build:
  dockerfile: ./Dockerfile
  args:
    PUPPETEER_SKIP_DOWNLOAD: "0"

env:
  NODE_ENV: production
  TZ: Asia/Shanghai
  CACHE_EXPIRE: "600"   # 增加缓存过期时间
  CHROMIUM_EXECUTABLE_PATH: /app/node_modules/.cache/puppeteer/chrome/linux-137.0.7151.119/chrome

ports:
  - internal: 1200
    protocol: tcp

instance:
  cpu: 0.5
  memory: 512
  scale:
    min: 1
    max: 1

build:
  cache: true
